<body class="is-loading">
    <!-- ===== Preloader (holds until the background + wallpaper are decoded) ===== -->
    <div class="preloader" id="preloader" role="status" aria-label="Loading">
        <div class="loader" aria-hidden="true">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
            <div class="bar4"></div>
            <div class="bar5"></div>

      <div class="phone-zoom" id="phoneZoom">

        <div class="phone-edge"></div>

        <div class="screen no-grain" id="screen">
            <!-- wallpaper -->
            <div class="wallpaper"></div>
            <span class="wp-orb wp-orb-purple"></span>
            <span class="wp-orb wp-orb-cyan"></span>

            <!-- dynamic island -->
            <div class="island"></div>

            <!-- status bar -->
            <div class="statusbar">
                <span class="sb-time">9:41</span>
                <div class="sb-right">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" class="sb-airplane" aria-label="Airplane Mode">

            </div>

            <!-- ===== LOCK SCREEN ===== -->

                    <span class="lock-time" id="lockTime">9:41</span>
                </div>
                <div class="lock-notifs" id="lockNotifs">

                    </button>
                    <button class="quick-btn" id="cameraBtn" aria-label="Camera">

            </div>

            <!-- ===== HOME SCREEN ===== -->
            <div class="homescreen" id="homescreen" aria-hidden="true">

                  <div class="page">

                    <button class="app" data-app="about">

                    <button class="app" data-app="music">

                        <span class="app-label">Weather</span>
                    </button>
                    <button class="app" data-app="clock">
                        <span class="app-icon"><img src="assets/icons/clock.png" alt="Clock"></span>
                        <span class="app-label">Clock</span>
                    </button>
                    <button class="app" data-app="notes">
                        <span class="app-icon"><img src="assets/icons/notes.png" alt="Notes"></span>
                        <span class="app-label">Notes</span>
                    </button>
                    <button class="app" data-app="settings">
                        <span class="app-icon"><img src="assets/icons/settings.png" alt="Settings"></span>
                        <span class="app-label">Settings</span>
                    </button>
                    <button class="app" data-app="calculator">
                        <span class="app-icon"><img src="assets/icons/calculator.png" alt="Calculator"></span>
                        <span class="app-label">Calculator</span>
                    </button>
                    </div>
                  </div>

                  <!-- page 2: empty -->
                  <div class="page page-empty">
                    <div class="app-grid"></div>
                  </div>
                </div>
              </div>

              <!-- page dots -->
              <div class="page-dots" id="pageDots">
                <button class="page-dot is-active" data-page="0" aria-label="Page 1"></button>
                <button class="page-dot" data-page="1" aria-label="Page 2"></button>

                <!-- Spotlight search pill (also opens via swipe-down on the grid) -->

                <!-- ===== SPOTLIGHT ===== -->
                <div class="spotlight" id="spotlight" aria-hidden="true">
                    <div class="spot-field" id="spotField">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>

                    <button class="app dock-app" data-app="mail">
                        <span class="app-icon"><img src="assets/icons/mail.png" alt="Mail"></span>
                    </button>
                    <button class="app dock-app" data-app="about">

                    <button class="app dock-app" data-app="skills">
                        <span class="app-icon"><img src="assets/icons/skills.png" alt="Skills"></span>
                    </button>
                </div>
            </div>

            <!-- ===== APP VIEW (opens over home) ===== -->
            <div class="appview" id="appview" aria-hidden="true">
                <div class="appview-header">
                    <span class="appview-title" id="appTitle">App</span>
                </div>
                <div class="appview-body" id="appBody"></div>
            </div>

            <!-- ===== CONTROL CENTER ===== -->
            <!-- transparent grab zone in the top-right: click or swipe down to open -->
            <button class="cc-trigger" id="ccTrigger" aria-label="Open Control Center"></button>
            <!-- small grab-handle hint under the status icons (Control Center) -->
            <span class="cc-hint" aria-hidden="true"></span>
            <div class="cc" id="controlCenter" aria-hidden="true">
                <!-- status icons shown while Control Center is open -->
                <div class="cc-status" aria-hidden="true">

                </div>
                <div class="cc-grid">
                    <!-- connectivity group (2x2 round toggles) -->

                        <button class="cc-rnd" data-cc="airplane" aria-label="Airplane Mode">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>
                        </button>
                        <button class="cc-rnd" data-cc="cellular" aria-label="Cellular Data">

                        </button>
                    </div>

                    <!-- now playing -> opens Music -->
                    <button class="cc-card cc-music" data-cc="music" aria-label="Now Playing">
                        <span class="cc-music-head">
                            <span class="cc-music-art"><img src="assets/icons/music.png" alt=""></span>

                            <div class="store-row-meta"><b>GitHub</b><span>dkode4</span></div>
                            <button class="store-get">GET</button>
                        </li>
                        <li class="store-row" data-link="https://www.linkedin.com/in/dmitrij-kraliks">
                            <img class="store-ico" src="assets/icons/linkedin.png" alt="">
                            <div class="store-row-meta"><b>LinkedIn</b><span>dmitrij-kraliks</span></div>
                            <button class="store-get">GET</button>
                        </li>
                        <li class="store-row" data-open="mail">
                            <img class="store-ico" src="assets/icons/mail.png" alt="">
                            <div class="store-row-meta"><b>Contact</b><span>Get in touch</span></div>
                            <button class="store-get">OPEN</button>
                        </li>
                    </ul>
                </div>
            </div>

            <nav class="store-tabs">
                <button class="store-tab is-active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M3 9h18"/></svg>
                    <span>Today</span>
                </button>
                <button class="store-tab">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="4" width="7" height="7" rx="2"/><rect x="13" y="4" width="7" height="7" rx="2"/><rect x="4" y="13" width="7" height="7" rx="2"/><rect x="13" y="13" width="7" height="7" rx="2"/></svg>
                    <span>Apps</span>
                </button>
                <button class="store-tab">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                    <span>Search</span>
                </button>
            </nav>
        </div>
      </template>

      <!-- Notes (working, saved to localStorage) -->
      <template id="tpl-notes">
        <div class="v-notes">
            <section class="notes-list-view" id="notesListView">
                <div class="notes-top">
                    <h1>Notes</h1>
                    <button class="notes-new" id="notesNew" aria-label="New note">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
                <ul class="notes-list" id="notesList"></ul>
                <div class="notes-empty" id="notesEmpty" hidden>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4zM8 9h8M8 13h8M8 17h5"/></svg>
                    <p>No notes yet</p>
                    <span>Tap + to write your first one.</span>
                </div>
            </section>

            <section class="notes-editor" id="notesEditor" hidden>
                <div class="notes-editor-top">
                    <button class="notes-back" id="notesBack">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        Notes
                    </button>
                    <button class="notes-del" id="notesDel" aria-label="Delete note">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
                    </button>
                </div>
                <textarea class="notes-area" id="notesArea" placeholder="Start writing…" spellcheck="false"></textarea>
            </section>
        </div>
      </template>

      <!-- Settings (working: brightness, airplane mode, wallpaper blur) -->
      <template id="tpl-settings">
        <div class="v-settings">
            <div class="set-top"><h1>Settings</h1></div>
            <div class="set-scroll">
                <div class="set-group">
                    <div class="set-row set-toggle" data-setting="airplane">
                        <span class="set-ico" style="background:#ff9f0a">✈</span>
                        <span class="set-label">Airplane Mode</span>
                        <button class="set-switch" role="switch"><span></span></button>
                    </div>
                    <div class="set-row">
                        <span class="set-ico" style="background:#0a84ff">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.66-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
                        </span>
                        <span class="set-label">Wi-Fi</span>
                        <span class="set-value">Home_5G</span>
                    </div>
                    <div class="set-row set-toggle" data-setting="bluetooth">
                        <span class="set-ico" style="background:#0a84ff">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="m12 2 5 4-5 4V2zm0 12 5 4-5 4v-8zM7 7l10 10M17 7 7 17" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                        </span>
                        <span class="set-label">Bluetooth</span>
                        <button class="set-switch on" role="switch"><span></span></button>
                    </div>
                </div>

                <div class="set-group">
                    <div class="set-slider-row">
                        <span class="set-ico" style="background:#0a84ff">☀</span>
                        <span class="set-label">Brightness</span>
                    </div>
                    <div class="set-slider-wrap">
                        <input type="range" id="setBrightness" class="set-slider" min="25" max="100" value="100">
                    </div>
                </div>

                <div class="set-group">
                    <div class="set-row set-toggle" data-setting="blur">
                        <span class="set-ico" style="background:#8b5cf6">▦</span>
                        <span class="set-label">Wallpaper Blur</span>
                        <button class="set-switch on" role="switch"><span></span></button>
                    </div>
                    <div class="set-row set-toggle" data-setting="grain">
                        <span class="set-ico" style="background:#6b7280">▤</span>
                        <span class="set-label">Background Grain</span>
                        <button class="set-switch" role="switch"><span></span></button>
                    </div>
                </div>

                <div class="set-group">
                    <div class="set-group-head">About</div>
                    <div class="set-row"><span class="set-label">Name</span><span class="set-value">Dmitrij's iPhone</span></div>
                    <div class="set-row"><span class="set-label">Software</span><span class="set-value">dOS 1.2</span></div>
                    <div class="set-row"><span class="set-label">Model</span><span class="set-value">iPhone 15 Pro</span></div>
                    <div class="set-row"><span class="set-label">Capacity</span><span class="set-value">256 GB</span></div>
                </div>
            </div>
        </div>
      </template>
    </div>

    <script src="script.js?v=125"></script>
</body>
</html>
